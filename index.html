<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Someone Special ❤️</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ❤️ Heart Rain -->
<div class="hearts" id="hearts"></div>

<!-- 🎁 Gift Screen -->
<div id="giftScreen" class="screen">

<div class="gift">🎁</div>

<h1>Hi... ❤️</h1>

<p>Kuchh Kahna Tha Aapse...</p>

<button onclick="openGift()">
💌 Open This
</button>

</div>

<!-- 💌 Message Screen -->
<div id="messageScreen" class="screen" style="display:none;">

<!-- ❤️ Image -->
<img
id="storyImage"
src="images/1.jpg"
alt="Story Image"
style="width:260px;
max-width:90%;
border-radius:20px;
margin:20px auto;
display:block;
box-shadow:0 0 20px rgba(255,255,255,.5);">

<!-- ❤️ Typing Text -->
<h2 id="typing"></h2>

<br>

<!-- ❤️ Next Button -->
<button
id="nextBtn"
style="display:none;"
onclick="nextMessage()">

Next ❤️

</button>

</div>

<script src="script.js"></script>

</body>
</html>
